<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voter Registration Form</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body{
    background-color: white;
    background: linear-gradient(to right, #e2e2e2, #c9d6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 90vh;
}

main{
    color: #000000;
    flex: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 70%;
    height: auto;
    padding: 20px 10px;
    position: relative;
    border-radius: 50px;
    z-index: 1;
}
form{
    background:rgb(255, 102, 0);
    padding:40px;
    width:400px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
main h1{
    color: black;
    font-size: 50px;
    letter-spacing: 0.8px;
    font-weight: 700;
    margin-bottom: 10px;
    justify-content: center;
}

label{
    display:block;
    margin-top:10px;
}
input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:4px;
}
button{
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    background-color: #ffc400;
    color: #fff;
    font-size:12px;
    padding: 12px 45px;
    border: 1px solid transparent;
    border-radius: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 10px;
    cursor: pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>
<body>
<form>
<h1>Voter Registration</h1>

<label>Full Name</label>
<input type="text" placeholder="Full Name" id="fullName"/>

<label>Date of Birth</label>
<input type="date" placeholder="Date of Birth" id="dob"/>

<label>Gender</label>
<select required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Address</label>
<input type="text" placeholder="Address" id="address"/>

<label>State</label>
<input type="text" placeholder="State" id="state"/>

<label>Voter ID Number</label>
<input type="text" placeholder="ID Number" id="voterId"/>

<button type="submit" id="registerBtn">Register</button>
</form>
</body>
</html>
